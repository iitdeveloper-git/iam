name: deploy-frontend-netlify

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "netlify.toml"
      - ".github/workflows/deploy-frontend-netlify.yaml"

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      NEXT_PUBLIC_IAM_API_URL: ${{ vars.NEXT_PUBLIC_IAM_API_URL }}
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Validate Netlify settings
        run: |
          test -n "$NETLIFY_AUTH_TOKEN" || (echo "Missing GitHub secret NETLIFY_AUTH_TOKEN" && exit 1)
          test -n "$NETLIFY_SITE_ID" || (echo "Missing GitHub secret NETLIFY_SITE_ID" && exit 1)

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --prefix frontend
      - run: npm run typecheck --prefix frontend
      - run: npm run build --prefix frontend
      - run: npx netlify-cli deploy --build --prod --site="$NETLIFY_SITE_ID" --auth="$NETLIFY_AUTH_TOKEN"
